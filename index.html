<!-- 一个最简单的HTML结构 -->
<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashuai Cao的网站</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
        }

        header {
            text-align: center;
            padding: 4rem 0;
            color: white;
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 1rem;
        }

        .card {
            background: white;
            border-radius: 1rem;
            padding: 2rem;
            margin: 1rem 0;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 2rem;
            }

            .container {
                padding: 1rem;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <header>
            <h1>欢迎来到Dashuai Cao的网站</h1>
            <p>这是一个关于Dashuai Cao的个人网站</p>
        </header>

        <div class="card">
            <h2>关于我</h2>
            <p>Dashuai Cao是一个来自中国的学生</p>
        </div>

        <div class="card">
            <h2>我的项目</h2>
            <p>Dashuai Cao</p>
        </div>
    </div>
</body>

</html><!-- 一个最简单的HTML结构 -->
